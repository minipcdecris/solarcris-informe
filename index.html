<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolarCRIS - Informe Mensual de Producción</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
    <style>
        body { background-color: #030712; font-family: system-ui, sans-serif; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        .cabecera-solar { background-image: url('cabecera.png'); background-size: cover; background-position: right center; position: relative; border: 1px solid #1e3254; }
        .cabecera-solar::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(to right, rgba(11, 20, 36, 0.95) 0%, rgba(11, 20, 36, 0.75) 50%, rgba(11, 20, 36, 0.3) 100%); border-radius: 24px; z-index: 1; }
        .tarjeta-solar { background-color: #0b1424; border: 1px solid #16243c; }

        @media print {
            @page { size: A4 portrait; margin: 5mm; }
            .no-print { display: none !important; }
            .salto-pagina { page-break-before: always !important; }
            
            .cabecera-solar { padding: 8px 12px !important; margin-bottom: 6px !important; border-radius: 8px !important; }
            .tarjeta-solar { page-break-inside: avoid !important; margin-bottom: 6px !important; padding: 8px !important; border-radius: 8px !important; }
            .grid-cols-2 { grid-template-columns: repeat(4, minmax(0, 1fr)) !important; gap: 4px !important; }
            
            .h-64 { height: 185px !important; }
            canvas { max-height: 185px !important; height: 185px !important; width: 100% !important; object-fit: contain; }
        }
    </style>
</head>
<body class="text-gray-100 p-4 max-w-5xl mx-auto min-h-screen">

    <header class="cabecera-solar rounded-3xl p-6 mb-6 shadow-2xl overflow-hidden">
        <div class="relative z-10 flex flex-col md:flex-row md:justify-between md:items-start gap-6">
            <div>
                <div class="flex items-center gap-3 text-2xl font-black text-white">
                    <span class="text-amber-400"><i class="fa-solid fa-sun"></i></span>
                    <span>Solar<span class="text-amber-400">CRIS</span></span>
                </div>
                <h1 class="text-xl font-extrabold text-white uppercase mt-2">Informe Mensual de Producción</h1>
                <p class="text-blue-400 font-semibold text-sm">Instalación Colectiva La Viña II</p>
            </div>
            <div class="no-print flex items-center gap-3">
                <input type="month" id="selectorMes" class="bg-[#0b1424] p-2 rounded-xl border border-[#1e3254] text-xs" style="color-scheme: dark;">
                <button onclick="window.print()" class="bg-blue-600 px-4 py-2 rounded-xl text-xs font-bold">Imprimir PDF</button>
            </div>
        </div>
    </header>

    <section class="tarjeta-solar rounded-3xl p-6 mb-6">
        <h2 class="text-xs font-bold uppercase text-gray-400 mb-4">Resumen del Mes</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-[#0e1a2f] p-4 rounded-2xl">
                <p class="text-[10px] text-gray-400">Producción Planta</p>
                <p class="text-lg font-black text-blue-400" id="mesTotal">--</p>
            </div>
            <div class="bg-[#0e1a2f] p-4 rounded-2xl">
                <p class="text-[10px] text-gray-400">Tu Producción</p>
                <p class="text-lg font-black text-purple-400" id="mesProp">--</p>
            </div>
            <div class="bg-[#0e1a2f] p-4 rounded-2xl">
                <p class="text-[10px] text-gray-400">Mejor Día</p>
                <p class="text-sm font-black text-amber-400" id="mejorDiaTexto">--</p>
            </div>
            <div class="bg-[#0e1a2f] p-4 rounded-2xl">
                <p class="text-[10px] text-gray-400">Pico Máximo</p>
                <p class="text-lg font-black text-emerald-400" id="picoMaximoTexto">--</p>
            </div>
        </div>
    </section>

    <div class="grid grid-cols-1 gap-6">
        <section class="tarjeta-solar rounded-3xl p-6"><div class="h-64"><canvas id="graficaInversor"></canvas></div></section>
        <section class="tarjeta-solar rounded-3xl p-6"><div class="h-64"><canvas id="graficaMensualReal"></canvas></div></section>
        <section class="tarjeta-solar rounded-3xl p-6"><div class="h-64"><canvas id="graficaMesActualPropiaReal"></canvas></div></section>
    </div>

    <section class="tarjeta-solar rounded-3xl p-6 shadow-xl salto-pagina mt-6">
        <h2 class="text-lg font-black uppercase text-blue-400 mb-6 flex items-center gap-2">
            <i class="fa-solid fa-robot"></i> Análisis Inteligente del Periodo
        </h2>
        <div class="bg-[#030712]/50 p-6 rounded-2xl border border-[#1e3254] text-gray-300 leading-relaxed text-sm" id="textoAnalisisIA">
            <p>Generando análisis del periodo...</p>
        </div>
    </section>

    <script>
        const supabaseClient = supabase.createClient("https://mybooeipkgfwhvwszysr.supabase.co", "sb_publishable_N7BPbBJcbKUElxxRg6xkCw_uj99wyuy");
        Chart.register(ChartDataLabels);
        let chartInversor, chartMensual, chartPropia;

        function formatearEnergia(v) { return v >= 1000 ? (v / 1000).toFixed(1) + " MWh" : v.toFixed(0) + " kWh"; }

        async function cargarDatosEInformes() {
            const selector = document.getElementById("selectorMes").value;
            const [year, month] = selector.split("-");
            const diasMes = new Date(year, month, 0).getDate();
            const startDate = `${year}-${month}-01`, endDate = `${year}-${month}-${diasMes}`;

            let r = await fetch(`/api/solaredge?timeUnit=MONTH&startDate=${startDate}&endDate=${endDate}`);
            let d = await r.json();
            let totalMes = ((d.energy?.values?.[0]?.value || 0) / 1000000) * 1000;
            let tuParte = totalMes * 0.0127 * 0.974;
            
            document.getElementById("mesTotal").innerText = formatearEnergia(totalMes);
            document.getElementById("mesProp").innerText = tuParte.toFixed(0) + " kWh";

            let rDiario = await fetch(`/api/solaredge?timeUnit=DAY&startDate=${startDate}&endDate=${endDate}`);
            let dDiario = await rDiario.json();
            let vals = dDiario.energy?.values || [];
            let inv = [], prop = [], labels = [];
            let maxInv = 0, maxProp = 0, idxInv = 0, idxProp = 0;

            for(let i=0; i<diasMes; i++) {
                labels.push(i+1);
                let val = (vals.find(v => new Date(v.date).getDate() === i+1)?.value || 0) / 1000;
                inv.push(val); if(val > maxInv) { maxInv = val; idxInv = i; }
                let p = val * 0.0127 * 0.974;
                prop.push(p); if(p > maxProp) { maxProp = p; idxProp = i; }
            }

            document.getElementById("picoMaximoTexto").innerText = maxInv.toFixed(0) + " kWh";
            document.getElementById("mejorDiaTexto").innerText = "Día " + (idxInv + 1);

            // Generar Texto IA
            document.getElementById("textoAnalisisIA").innerHTML = `
                <p>Durante el mes, la instalación ha generado <strong>${formatearEnergia(totalMes)}</strong>.</p>
                <p>Tu cuota ha sido de <strong>${tuParte.toFixed(0)} kWh</strong>, destacando el día ${idxInv+1} como el más eficiente.</p>
                <p>La clave de la rentabilidad está en <strong>sincronizar tus consumos</strong> con las horas centrales del día para maximizar el uso directo de esta energía verde.</p>`;

            // Gráficas
            if(chartInversor) chartInversor.destroy();
            chartInversor = new Chart(document.getElementById("graficaInversor"), { type: 'bar', data: { labels, datasets: [{ data: inv, backgroundColor: "#3b82f6" }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { datalabels: { color: '#fff', font: { size: 10.5 }, anchor: 'end', align: 'top' } } } });
            
            if(chartPropia) chartPropia.destroy();
            chartPropia = new Chart(document.getElementById("graficaMesActualPropiaReal"), { type: 'bar', data: { labels, datasets: [{ data: prop, backgroundColor: "#8b5cf6" }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { datalabels: { color: '#fff', font: { size: 10.5 }, anchor: 'end', align: 'top' } } } });

            // Mensual
            const { data } = await supabaseClient.from('produccion').select('*').order('mes');
            if(chartMensual) chartMensual.destroy();
            chartMensual = new Chart(document.getElementById("graficaMensualReal"), { type: 'bar', data: { labels: data.map(d => d.mes), datasets: [{ data: data.map(d => d.reparto), backgroundColor: "#3b82f6" }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { datalabels: { color: '#fff', font: { size: 16 }, anchor: 'end', align: 'top' } } } });
        }

        window.onload = () => {
            let h = new Date();
            document.getElementById("selectorMes").value = `${h.getFullYear()}-${String(h.getMonth()+1).padStart(2,'0')}`;
            document.getElementById("selectorMes").addEventListener("change", cargarDatosEInformes);
            cargarDatosEInformes();
        };
    </script>
</body>
</html>
